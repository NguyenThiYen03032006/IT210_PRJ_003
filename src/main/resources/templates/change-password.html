<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Doi mat khau</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/cinema.css}">
</head>
<body class="cinema-body">
<div th:replace="~{layout/site-header :: site-header}"></div>

<main class="container cinema-section">
    <div class="row justify-content-center">
        <div class="col-lg-5">
            <form class="cinema-panel p-4" th:action="@{/change-password}" method="post">
                <p class="subtle-label">Bao mat</p>
                <h1 class="page-title mb-4">Doi mat khau</h1>

                <div th:if="${error}" class="alert alert-danger">
                    <span th:text="${error}"></span>
                </div>

                <div class="form-group">
                    <label>Mat khau hien tai</label>
                    <input type="password" name="currentPassword" class="form-control cinema-input" required>
                </div>
                <div class="form-group">
                    <label>Mat khau moi</label>
                    <input type="password" name="newPassword" class="form-control cinema-input" required>
                </div>
                <div class="form-group">
                    <label>Nhap lai mat khau moi</label>
                    <input type="password" name="confirmPassword" class="form-control cinema-input" required>
                </div>
                <button type="submit" class="btn cinema-btn cinema-btn-gold btn-block">Cap nhat</button>
                <a th:href="@{/profile-page}" class="btn cinema-btn cinema-btn-outline btn-block mt-2">Quay lai</a>
            </form>
        </div>
    </div>
</main>
</body>
</html>
