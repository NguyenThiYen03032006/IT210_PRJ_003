<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đổi mật khẩu</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/cinema.css}">
</head>
<body class="cinema-body">
<div th:replace="~{layout/site-header :: site-header}"></div>

<main class="container cinema-section">
    <div class="row justify-content-center">
        <div class="col-lg-5 col-md-7">
            <div class="cinema-panel p-4">
                <p class="subtle-label">Bảo mật</p>
                <h1 class="page-title mb-4">Đổi mật khẩu</h1>

                <div th:if="${error}" class="alert alert-danger">
                    <span th:text="${error}"></span>
                </div>

                <form th:action="@{/change-password}" method="post">
                    <div class="form-group">
                        <label>Mật khẩu hiện tại</label>
                        <input type="password" name="currentPassword" class="form-control cinema-input" required>
                    </div>
                    <div class="form-group">
                        <label>Mật khẩu mới</label>
                        <input type="password" name="newPassword" class="form-control cinema-input" required minlength="6">
                    </div>
                    <div class="form-group">
                        <label>Nhập lại mật khẩu mới</label>
                        <input type="password" name="confirmPassword" class="form-control cinema-input" required minlength="6">
                    </div>
                    <button type="submit" class="btn cinema-btn cinema-btn-gold btn-block">Cập nhật</button>
                    <a th:href="@{/profile-page}" class="btn cinema-btn cinema-btn-outline btn-block mt-2">Quay lại</a>
                </form>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{layout/site-footer :: site-footer}"></div>
<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
