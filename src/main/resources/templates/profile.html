<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Profile</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/cinema.css}">
</head>
<body class="cinema-body">
<div th:replace="~{layout/site-header :: site-header}"></div>

<main class="container cinema-section">
    <div class="row">
        <aside class="col-lg-4 mb-4">
            <div class="cinema-panel p-4 text-center">
                <div class="mx-auto mb-3 rounded-circle d-flex align-items-center justify-content-center"
                     style="width:96px;height:96px;background:var(--cinema-gold);color:#071826;font-size:36px;font-weight:800;">
                    <span th:text="${#strings.substring(user.username, 0, 1).toUpperCase()}">U</span>
                </div>
                <h3 th:text="${user.profile.fullName}">Họ tên</h3>
                <span class="badge badge-warning" th:text="${user.role}">CUSTOMER</span>
                <hr style="border-color: var(--cinema-line);">
                <p class="text-muted mb-1">Username</p>
                <p th:text="${user.username}">username</p>
                <p class="text-muted mb-1">Email</p>
                <p th:text="${user.email}">email</p>
                <p class="text-muted mb-1">Số điện thoại</p>
                <p th:text="${user.profile.phone != null ? user.profile.phone : 'Chưa cập nhật'}">phone</p>
                <a th:href="@{/edit-profile}" class="btn cinema-btn cinema-btn-gold btn-block">Chỉnh sửa hồ sơ</a>
                <button type="button" class="btn cinema-btn cinema-btn-outline btn-block mt-2">Đổi mật khẩu</button>
                <a th:href="${homeUrl}" class="btn cinema-btn cinema-btn-outline btn-block mt-2">Trang chủ</a>
            </div>
        </aside>

        <section class="col-lg-8">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h2>Danh sách vé đã đặt</h2>
                <a class="btn cinema-btn cinema-btn-outline" th:href="@{/customer/bookings}">Xem tất cả</a>
            </div>
            <div class="history-ticket p-3 mb-3" th:each="booking : ${bookings}">
                <div class="d-flex align-items-center">
                    <div class="qr-box mr-3">QR</div>
                    <div class="flex-grow-1">
                        <small class="text-muted">Mã vé #<span th:text="${booking.bookingId}">1</span></small>
                        <h5 class="mb-1" th:text="${booking.movieTitle}">Tên phim</h5>
                        <p class="text-muted mb-1"
                           th:text="${#temporals.format(booking.startTime, 'dd/MM/yyyy HH:mm')} + ' - ' + ${booking.roomName}">
                            07/05/2026 19:00
                        </p>
                        <p class="mb-0">Ghế: <strong th:text="${#strings.listJoin(booking.seatNames, ', ')}">A1</strong></p>
                    </div>
                    <div class="text-right">
                        <span class="badge badge-success" th:if="${booking.status == 'PAID'}">Thành công</span>
                        <span class="badge badge-secondary" th:if="${booking.status == 'CANCELLED'}">Đã hủy</span>
                    </div>
                </div>
            </div>
            <div class="cinema-panel p-5 text-center" th:if="${#lists.isEmpty(bookings)}">
                <h4>Chưa có lịch sử đặt vé</h4>
                <p class="text-muted mb-0">Các vé đã thanh toán sẽ xuất hiện trong khu vực này.</p>
            </div>
        </section>
    </div>
</main>

<div th:replace="~{layout/site-footer :: site-footer}"></div>
<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
