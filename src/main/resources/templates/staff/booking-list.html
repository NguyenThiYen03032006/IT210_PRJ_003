<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Staff - Xac nhan ve</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/cinema.css}">
</head>
<body class="cinema-body">
<nav class="navbar navbar-expand-lg navbar-dark cinema-nav">
    <div class="container">
        <a class="navbar-brand cinema-brand" th:href="@{/staff/bookings}">CineGold Staff</a>
        <div class="ml-auto">
            <a th:href="@{/profile-page}" class="btn cinema-btn cinema-btn-outline mr-2">Profile</a>
            <a th:href="@{/logout}" class="btn cinema-btn cinema-btn-gold">Dang xuat</a>
        </div>
    </div>
</nav>

<main class="container cinema-section">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <p class="subtle-label">Ticket Desk</p>
            <h1 class="page-title">Lich su dat ve va xac nhan</h1>
        </div>
    </div>

    <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}">Da xac nhan</div>

    <div class="history-ticket p-4 mb-3" th:each="booking : ${bookings}">
        <div class="row align-items-center">
            <div class="col-md-auto mb-3 mb-md-0">
                <div class="qr-box">QR</div>
            </div>
            <div class="col-md">
                <small class="text-muted">Ma ve #<span th:text="${booking.bookingId}">1</span></small>
                <h4 class="mb-1" th:text="${booking.movieTitle}">Ten phim</h4>
                <p class="text-muted mb-1">
                    <span th:text="${#temporals.format(booking.startTime, 'dd/MM/yyyy HH:mm')}">08/05/2026 19:00</span>
                    <span class="mx-2">-</span>
                    <span th:text="${booking.roomName}">Room</span>
                </p>
                <p class="mb-0">Ghe: <strong th:text="${#strings.listJoin(booking.seatNames, ', ')}">A1</strong></p>
            </div>
            <div class="col-md-auto text-md-right mt-3 mt-md-0">
                <div class="text-warning font-weight-bold"
                     th:text="${#numbers.formatDecimal(booking.totalPrice, 0, 'COMMA', 0, 'POINT')} + 'd'">75000d</div>
                <span class="badge badge-success" th:if="${booking.status == 'PAID'}">Da thanh toan</span>
                <span class="badge badge-info" th:if="${booking.status == 'CONFIRMED'}">Da xac nhan</span>
                <span class="badge badge-secondary" th:if="${booking.status == 'CANCELLED'}">Da huy</span>
                <form th:if="${booking.status == 'PAID'}"
                      th:action="@{'/staff/bookings/' + ${booking.bookingId} + '/confirm'}"
                      method="post"
                      class="mt-2">
                    <button class="btn btn-sm cinema-btn cinema-btn-gold" type="submit">Xac nhan ve</button>
                </form>
            </div>
        </div>
    </div>

    <div class="cinema-panel p-5 text-center" th:if="${#lists.isEmpty(bookings)}">
        <h4>Chua co ve nao</h4>
        <p class="text-muted mb-0">Danh sach ve se hien thi sau khi customer dat ve.</p>
    </div>
</main>
</body>
</html>
