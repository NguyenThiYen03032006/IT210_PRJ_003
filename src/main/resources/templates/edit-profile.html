<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Edit Profile</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/cinema.css}">
</head>
<body class="cinema-body">
<div th:replace="~{layout/site-header :: site-header}"></div>

<main class="container cinema-section">
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <form class="cinema-panel p-4" action="/update-profile" method="post">
                <p class="subtle-label">Profile</p>
                <h1 class="page-title mb-4">Chỉnh sửa thông tin</h1>

                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="userName" class="form-control cinema-input" th:value="${user.profile.getUser().getUsername()}">
                </div>
                <div class="form-group">
                    <label>Họ tên</label>
                    <input type="text" name="fullName" class="form-control cinema-input" th:value="${user.profile.fullName}">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" class="form-control cinema-input" th:value="${user.email}">
                </div>
                <div class="form-group">
                    <label>Số điện thoại</label>
                    <input type="text" name="phone" class="form-control cinema-input" th:value="${user.profile.phone}">
                </div>
                <div th:if="${error}" class="alert alert-danger">
                    <span th:text="${error}"></span>
                </div>
                <button class="btn cinema-btn cinema-btn-gold">Lưu</button>
                <a th:href="@{/profile-page}" class="btn cinema-btn cinema-btn-outline">Quay lại</a>
            </form>
        </div>
    </div>
</main>
</body>
</html>
