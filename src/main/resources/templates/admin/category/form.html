<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Save Category</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-0 shadow-lg" style="border-radius: 15px;">
                <div class="card-header bg-primary text-white text-center py-3" style="border-radius: 15px 15px 0 0;">
                    <h4 class="mb-0" th:text="${category.id != null ? 'Cập nhật danh mục' : 'Thêm danh mục mới'}"></h4>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/admin/categories/save}" th:object="${category}" method="post">

                        <!-- Hidden ID -->
                        <input type="hidden" th:field="*{id}" />

                        <div class="form-group">
                            <label class="font-weight-bold">Tên danh mục</label>
                            <input type="text"
                                   th:field="*{name}"
                                   class="form-control form-control-lg"
                                   placeholder="Nhập tên danh mục (vd: Phim Hành Động)"
                                   required />
                            <small class="text-muted">Tên danh mục nên ngắn gọn và súc tích.</small>
                        </div>

                        <div class="d-flex justify-content-between mt-4">
                            <a href="/admin/categories" class="btn btn-light px-4">Quay lại</a>
                            <button type="submit" class="btn btn-success px-5 shadow-sm font-weight-bold">
                                <i class="fas fa-save mr-2"></i> Lưu dữ liệu
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
