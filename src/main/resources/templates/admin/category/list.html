<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Category Management</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        .category-card {
            transition: transform 0.2s, box-shadow 0.2s;
            border: none;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .category-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.15);
        }
        .btn-action {
            border-radius: 20px;
            padding: 5px 15px;
        }
    </style>
</head>
<body class="bg-light">
<div th:replace="~{header :: header}"></div>
<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <a href="/admin/home" class="btn btn-primary">Quay lại</a>
        <h3 class="font-weight-bold text-dark">Danh mục phim</h3>
        <a href="/admin/categories/create" class="btn btn-primary shadow-sm">
            <i class="fas fa-plus mr-2"></i> Thêm mới
        </a>
    </div>

    <!-- Hiển thị dạng thẻ -->
    <div class="row">
        <div class="col-md-4 col-sm-6 mb-4" th:each="c : ${categories}">
            <div class="card category-card h-100">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-start">
                        <div>
                            <span class="badge badge-pill badge-secondary mb-2" th:text="'ID: ' + ${c.id}"></span>
                            <h5 class="card-title font-weight-bold text-primary" th:text="${c.name}"></h5>
                        </div>
                        <i class="fas fa-folder-open fa-2x text-light"></i>
                    </div>
                </div>
                <div class="card-footer bg-white border-0 d-flex justify-content-end pb-3">
                    <a th:href="@{'/admin/categories/edit/' + ${c.id}}"
                       class="btn btn-outline-info btn-sm btn-action mr-2">
                        <i class="fas fa-edit"></i> Sửa
                    </a>
                    <a th:href="@{'/admin/categories/delete/' + ${c.id}}"
                       class="btn btn-outline-danger btn-sm btn-action"
                       onclick="return confirm('Xác nhận xóa?')">
                        <i class="fas fa-trash"></i> Xóa
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
