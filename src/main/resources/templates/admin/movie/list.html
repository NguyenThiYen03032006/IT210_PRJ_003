<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Movie List</title>
    <link rel="stylesheet"
          href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        .movie-card {
            transition: transform 0.2s;
            height: 100%;
        }
        .movie-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .card-img-top {
            height: 350px;
            object-fit: cover; /* Giúp ảnh không bị méo */
            background-color: #f8f9fa;
        }
    </style>
</head>

<body>
<div th:replace="~{header :: header}"></div>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3>🎬 Danh sách phim</h3>
        <div>
            <a href="/admin/home" class="btn btn-outline-secondary">Quay lại</a>
            <a href="/admin/movies/create" class="btn btn-primary">+ Thêm phim mới</a>
        </div>
    </div>

    <!-- Bắt đầu Grid Card -->
    <div class="row">
        <!-- Duyệt danh sách phim -->
        <div class="col-6 col-md-4 col-lg-3 mb-4" th:each="m : ${movies}">
            <div class="card movie-card">
                <!-- Ảnh mặc định (Placeholder) -->
                <img th:src="${m.poster != null && !m.poster.isEmpty()} ? ${m.poster} : 'https://via.placeholder.com/300x450?text=No+Poster'"
                     class="card-img-top" alt="Movie Poster">

                <div class="card-body d-flex flex-column">
                    <h5 class="card-title text-truncate" th:text="${m.title}" th:title="${m.title}">Tên phim</h5>

                    <p class="card-text mb-1">
                        <span class="badge badge-info" th:text="${m.genre.name}">Thể loại</span>
                        <span class="badge badge-secondary" th:text="${m.category.name}">Danh mục</span>
                    </p>

                    <p class="card-text small text-muted">
                        <i class="far fa-clock"></i> <span th:text="${m.duration} + ' phút'"></span> <br>
                        <i class="far fa-calendar-alt"></i> <span th:text="${m.releaseDate}"></span>
                    </p>

                    <div class="mt-auto d-flex justify-content-between">
                        <a th:href="@{'/admin/movies/edit/' + ${m.id}}"
                           class="btn btn-warning btn-sm flex-fill mr-1">Sửa</a>

                        <a th:href="@{'/admin/movies/delete/' + ${m.id}}"
                           class="btn btn-danger btn-sm flex-fill ml-1"
                           onclick="return confirm('Xoá phim này?')">Xoá</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- Kết thúc Grid Card -->

    <!-- Hiển thị thông báo nếu danh sách trống -->
    <div th:if="${#lists.isEmpty(movies)}" class="text-center py-5">
        <p class="text-muted">Chưa có bộ phim nào trong danh sách.</p>
    </div>

</div>

<!-- Thêm FontAwesome để dùng icon cho đẹp -->
<script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</body>
</html>
