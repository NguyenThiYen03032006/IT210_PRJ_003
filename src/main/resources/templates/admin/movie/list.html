<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quan ly phim</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/cinema.css}">
</head>
<body class="admin-shell">
<div class="container-fluid">
    <div class="row">
        <div th:replace="~{admin/admin-sidebar :: admin-sidebar}"></div>
        <main class="col-md-9 col-lg-10 p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <p class="subtle-label">Movies</p>
                    <h1 class="page-title">Quan ly phim</h1>
                </div>
                <a th:href="@{/admin/movies/create}" class="btn cinema-btn cinema-btn-gold">Them phim</a>
            </div>

            <div class="alert alert-danger" th:if="${errorMessage}">
                <span th:text="${errorMessage}">Loi</span>
            </div>
            <div class="alert alert-success" th:if="${successMessage}">
                <span th:text="${successMessage}">Thanh cong</span>
            </div>

            <div class="row">
                <div class="col-6 col-md-4 col-lg-3 mb-4" th:each="m : ${movies}">
                    <article class="movie-card">
                        <img th:src="${m.poster != null && !m.poster.isEmpty()} ? ${m.poster} : 'https://via.placeholder.com/360x540/12304a/f4c542?text=CineGold'"
                             class="movie-poster" alt="Movie Poster">
                        <div class="p-3">
                            <h5 class="mb-1 text-truncate" th:text="${m.title}" th:title="${m.title}">Ten phim</h5>
                            <p class="mb-2">
                                <span class="badge badge-warning" th:text="${m.genre != null ? m.genre.name : 'N/A'}">Genre</span>
                                <span class="badge badge-secondary" th:text="${m.category != null ? m.category.name : 'N/A'}">Category</span>
                            </p>
                            <small class="text-muted d-block mb-3" th:text="${m.duration} + ' phut'">120 phut</small>
                            <div class="d-flex">
                                <a th:href="@{'/admin/movies/edit/' + ${m.id}}" class="btn btn-sm cinema-btn cinema-btn-outline flex-fill mr-2">Sua</a>
                                <a th:href="@{'/admin/movies/delete/' + ${m.id}}"
                                   class="btn btn-sm btn-outline-danger flex-fill"
                                   onclick="return confirm('Xoa phim nay?')">Xoa</a>
                            </div>
                        </div>
                    </article>
                </div>
            </div>

            <div th:if="${#lists.isEmpty(movies)}" class="cinema-panel p-5 text-center">
                <p class="text-muted mb-0">Chua co phim nao.</p>
            </div>
        </main>
    </div>
</div>
</body>
</html>
