<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/cinema.css}">
</head>
<body class="admin-shell">
<div class="container-fluid">
    <div class="row">
        <div th:replace="~{admin/admin-sidebar :: admin-sidebar}"></div>
        <main class="col-md-9 col-lg-10 p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <p class="subtle-label">Dashboard</p>
                    <h1 class="page-title">Tổng quan hệ thống</h1>
                </div>
                <a class="btn cinema-btn cinema-btn-gold" th:href="@{/admin/showtimes}">Quản lý suất chiếu</a>
            </div>

            <div class="row">
                <div class="col-md-4 mb-3">
                    <div class="cinema-panel p-4">
                        <small class="text-muted">Tổng số phim</small>
                        <h2 class="mb-0">3</h2>
                    </div>
                </div>
                <div class="col-md-4 mb-3">
                    <div class="cinema-panel p-4">
                        <small class="text-muted">Phòng chiếu</small>
                        <h2 class="mb-0">2</h2>
                    </div>
                </div>
                <div class="col-md-4 mb-3">
                    <div class="cinema-panel p-4">
                        <small class="text-muted">Ghế test</small>
                        <h2 class="mb-0">100</h2>
                    </div>
                </div>
            </div>

            <div class="cinema-panel p-4 mt-3">
                <h5 class="mb-3">Lối tắt quản trị</h5>
                <a class="btn cinema-btn cinema-btn-outline mr-2 mb-2" th:href="@{/admin/movies}">Phim</a>
                <a class="btn cinema-btn cinema-btn-outline mr-2 mb-2" th:href="@{/admin/showtimes}">Suất chiếu</a>
                <a class="btn cinema-btn cinema-btn-outline mr-2 mb-2" th:href="@{/admin/categories}">Danh mục</a>
                <a class="btn cinema-btn cinema-btn-outline mb-2" th:href="@{/admin/genre}">Thể loại</a>
            </div>
        </main>
    </div>
</div>
</body>
</html>
