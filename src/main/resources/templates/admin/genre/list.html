<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>The loai</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/cinema.css}">
</head>
<body class="admin-shell">
<div class="container-fluid">
    <div class="row">
        <div th:replace="~{admin/admin-sidebar :: admin-sidebar}"></div>
        <main class="col-md-9 col-lg-10 p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <p class="subtle-label">Genres</p>
                    <h1 class="page-title">The loai phim</h1>
                </div>
                <a th:href="@{/admin/genre/create}" class="btn cinema-btn cinema-btn-gold">Them the loai</a>
            </div>
            <div class="cinema-panel p-4">
                <table class="table cinema-table">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Ten the loai</th>
                        <th class="text-right">Hanh dong</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="g : ${genres}">
                        <td th:text="${g.id}">1</td>
                        <td th:text="${g.name}">Action</td>
                        <td class="text-right">
                            <a th:href="@{'/admin/genre/edit/' + ${g.id}}" class="btn btn-sm cinema-btn cinema-btn-outline">Sua</a>
                            <a th:href="@{'/admin/genre/delete/' + ${g.id}}"
                               class="btn btn-sm btn-outline-danger"
                               onclick="return confirm('Xoa the loai nay?')">Xoa</a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>
</div>
</body>
</html>
