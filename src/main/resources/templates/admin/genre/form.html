<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>The loai</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/cinema.css}">
</head>
<body class="admin-shell">
<div class="container-fluid">
    <div class="row">
        <div th:replace="~{admin/admin-sidebar :: admin-sidebar}"></div>
        <main class="col-md-9 col-lg-10 p-4">
            <p class="subtle-label">Genres</p>
            <h1 class="page-title mb-4" th:text="${genre.id == null} ? 'Them the loai' : 'Sua the loai'">The loai</h1>
            <form class="cinema-panel p-4" th:action="@{/admin/genre/save}" th:object="${genre}" method="post">
                <input type="hidden" th:field="*{id}"/>
                <div class="form-group">
                    <label>Ten the loai</label>
                    <input type="text" class="form-control cinema-input" th:field="*{name}" required>
                </div>
                <button class="btn cinema-btn cinema-btn-gold">Luu</button>
                <a th:href="@{/admin/genre}" class="btn cinema-btn cinema-btn-outline">Quay lai</a>
            </form>
        </main>
    </div>
</div>
</body>
</html>
