<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/cinema.css}">
</head>
<body class="cinema-body d-flex align-items-center" style="min-height:100vh;">
<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-4 col-md-6">
            <div class="cinema-panel p-4">
                <h2 class="text-center mb-1">Đăng nhập</h2>
                <p class="text-muted text-center mb-4">Chào mừng bạn quay lại CineGold.</p>

                <form th:action="@{/auth/login}" th:object="${login}" method="post">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="text" th:field="*{username}" class="form-control cinema-search"
                               th:classappend="${#fields.hasErrors('username')} ? 'is-invalid'">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
                    </div>
                    <div class="form-group">
                        <label>Mật khẩu</label>
                        <input type="password" th:field="*{password}" class="form-control cinema-search"
                               th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                    </div>
                    <div class="text-danger mb-2" th:if="${loginError}">
                        <span th:text="${loginError}"></span>
                    </div>
                    <button type="submit" class="btn cinema-btn cinema-btn-gold btn-block">Đăng nhập</button>
                </form>

                <div class="text-center mt-3">
                    <a class="text-warning" th:href="@{/auth/register-page}">Chưa có tài khoản? Đăng ký</a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
