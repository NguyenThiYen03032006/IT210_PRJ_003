<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title th:text="${movie.title}">Chi tiết phim</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/cinema.css}">
</head>
<body class="cinema-body">
<div th:replace="~{layout/site-header :: site-header}"></div>

<main class="container cinema-section">
    <div class="row">
        <div class="col-md-4 mb-4">
            <img class="movie-poster rounded"
                 th:src="${movie.poster != null && !movie.poster.isEmpty()} ? ${movie.poster} : 'https://via.placeholder.com/420x630/1a1d26/f2c14e?text=CineGold'"
                 th:alt="${movie.title}">
        </div>
        <div class="col-md-8">
            <span class="age-badge">T13</span>
            <h1 class="mt-3" th:text="${movie.title}">Tên phim</h1>
            <p class="text-muted">
                <span th:text="${movie.releaseDate}">2026</span>
                <span class="mx-2">•</span>
                <span th:text="${movie.duration} + ' phút'">120 phút</span>
                <span class="mx-2">•</span>
                <span th:text="${movie.genre != null ? movie.genre.name : 'Đang cập nhật'}">Thể loại</span>
            </p>
            <div class="cinema-panel p-4 mb-4">
                <h5>Mô tả</h5>
                <p class="text-muted mb-0" th:text="${movie.description != null ? movie.description : 'Nội dung phim đang được cập nhật.'}">
                    Nội dung phim.
                </p>
            </div>
            <div class="row">
                <div class="col-sm-6 mb-3">
                    <div class="cinema-panel p-3">
                        <small class="text-muted">Năm sản xuất</small>
                        <div th:text="${movie.releaseDate != null ? #temporals.format(movie.releaseDate, 'yyyy') : 'Đang cập nhật'}">2026</div>
                    </div>
                </div>
                <div class="col-sm-6 mb-3">
                    <div class="cinema-panel p-3">
                        <small class="text-muted">Đạo diễn</small>
                        <div>Đang cập nhật</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <section class="cinema-section">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2 class="mb-0">Chọn suất chiếu</h2>
            <a class="btn cinema-btn cinema-btn-outline" th:href="@{/customer/home}">Quay lại</a>
        </div>

        <div class="cinema-panel p-4">
            <div class="mb-4">
                <span class="genre-chip" th:each="showtime : ${showtimes}"
                      th:text="${#temporals.format(showtime.startTime, 'EEE dd/MM')}">Thứ 2 07/05</span>
            </div>

            <a th:each="showtime : ${showtimes}"
               class="showtime-btn"
               th:classappend="${showtime.startTime.isBefore(T(java.time.LocalDateTime).now())} ? ' disabled'"
               th:href="@{'/customer/showtimes/' + ${showtime.id} + '/seats'}">
                <span th:text="${#temporals.format(showtime.startTime, 'HH:mm')}">09:00</span>
                <span class="ml-2 text-muted" th:text="${showtime.room.name}">Phòng 1</span>
            </a>

            <p class="text-muted mb-0" th:if="${#lists.isEmpty(showtimes)}">Chưa có suất chiếu cho phim này.</p>
        </div>
    </section>
</main>

<div th:replace="~{layout/site-footer :: site-footer}"></div>
<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
