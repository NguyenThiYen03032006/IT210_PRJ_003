<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Chọn ghế</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/cinema.css}">
</head>
<body class="cinema-body" data-ticket-price="75000">
<div th:replace="~{layout/site-header :: site-header}"></div>

<main class="container cinema-section">
    <div class="row">
        <div class="col-lg-8 mb-4">
            <div class="screen-arc">MÀN HÌNH</div>
            <div class="seat-grid mx-auto">
                <button th:each="seat, stat : ${seats}"
                        type="button"
                        class="seat"
                        th:classappend="${#lists.contains(bookedSeatIds, seat.id)} ? ' sold' : (${stat.index >= 40} ? ' sweetbox' : (${stat.index >= 20} ? ' vip' : ''))"
                        th:attr="data-seat-id=${seat.id},data-seat-name=${seat.seatName}"
                        th:text="${#lists.contains(bookedSeatIds, seat.id)} ? 'X' : ${seat.seatName}">
                    A1
                </button>
            </div>
            <div class="d-flex flex-wrap justify-content-center mt-4 text-muted">
                <span class="mr-4"><span class="seat d-inline-flex" style="width:26px;height:26px;"></span> Thường</span>
                <span class="mr-4"><span class="seat vip d-inline-flex" style="width:26px;height:26px;"></span> VIP</span>
                <span class="mr-4"><span class="seat sweetbox d-inline-flex" style="width:26px;height:26px;"></span> Sweetbox</span>
                <span class="mr-4"><span class="seat sold d-inline-flex" style="width:26px;height:26px;">X</span> Đã bán</span>
                <span><span class="seat selected d-inline-flex" style="width:26px;height:26px;"></span> Đang chọn</span>
            </div>
        </div>

        <aside class="col-lg-4">
            <div class="cinema-panel p-4 sticky-top" style="top: 86px;">
                <h4 th:text="${showtime.movie.title}">Tên phim</h4>
                <p class="text-muted mb-2">
                    <span th:text="${showtime.room.name}">Phòng</span>
                    <span class="mx-2">•</span>
                    <span th:text="${#temporals.format(showtime.startTime, 'dd/MM/yyyy HH:mm')}">07/05/2026 19:00</span>
                </p>
                <hr style="border-color: var(--cinema-line);">
                <p>Ghế đã chọn: <strong data-selected-seats>Chưa chọn</strong></p>
                <p>Tạm tính: <strong class="text-warning" data-total-price>0đ</strong></p>
                <form data-booking-form th:attr="data-showtime-id=${showtime.id}">
                    <button type="submit" class="btn cinema-btn cinema-btn-gold btn-block">Thanh toán</button>
                </form>
                <p class="text-danger mt-3 mb-0" data-booking-message></p>
            </div>
        </aside>
    </div>
</main>

<div th:replace="~{layout/site-footer :: site-footer}"></div>
<script th:src="@{/js/seat-map.js}"></script>
</body>
</html>
