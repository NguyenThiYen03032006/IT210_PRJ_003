<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Lich su dat ve</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/cinema.css}">
</head>
<body class="cinema-body">
<div th:replace="~{layout/site-header :: site-header}"></div>

<main class="container cinema-section">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Ve da dat</h1>
        <a class="btn cinema-btn cinema-btn-outline" th:href="@{/customer/home}">Tiep tuc dat ve</a>
    </div>

    <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>
    <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

    <div class="history-ticket p-4 mb-3" th:each="booking : ${bookings}">
        <div class="row align-items-center">
            <div class="col-md-auto mb-3 mb-md-0">
                <div class="qr-box">QR</div>
            </div>
            <div class="col-md">
                <small class="text-muted">Ma ve #<span th:text="${booking.bookingId}">1</span></small>
                <h4 class="mb-1" th:text="${booking.movieTitle}">Ten phim</h4>
                <p class="text-muted mb-1">
                    <span th:text="${#temporals.format(booking.startTime, 'dd/MM/yyyy HH:mm')}">07/05/2026 19:00</span>
                    <span class="mx-2">-</span>
                    <span th:text="${booking.roomName}">Phong</span>
                </p>
                <p class="mb-0">Ghe: <strong th:text="${#strings.listJoin(booking.seatNames, ', ')}">A1</strong></p>
            </div>
            <div class="col-md-auto text-md-right mt-3 mt-md-0">
                <div class="text-warning font-weight-bold"
                     th:text="${#numbers.formatDecimal(booking.totalPrice, 0, 'COMMA', 0, 'POINT')} + 'd'">75,000d</div>
                <span class="badge badge-success" th:if="${booking.status == 'PAID'}">Da thanh toan</span>
                <span class="badge badge-info" th:if="${booking.status == 'CONFIRMED'}">Da xac nhan</span>
                <span class="badge badge-warning text-dark" th:if="${booking.status == 'CANCEL_REQUESTED'}">Da gui yeu cau huy</span>
                <span class="badge badge-secondary" th:if="${booking.status == 'CANCELLED'}">Da huy</span>
                <a class="btn btn-sm cinema-btn cinema-btn-outline d-block mt-2"
                   th:href="@{/customer/bookings/{id}(id=${booking.bookingId})}">Hoa don chi tiet</a>
                <form th:if="${booking.status == 'PAID'}"
                      th:action="@{'/customer/bookings/' + ${booking.bookingId} + '/cancel-form'}"
                      method="post"
                      class="mt-2"
                      onsubmit="return confirm('Gui yeu cau huy ve cho nhan vien xu ly?');">
                    <button class="btn btn-sm btn-outline-danger" type="submit">Gui yeu cau huy</button>
                </form>
            </div>
        </div>
    </div>

    <div class="cinema-panel p-5 text-center" th:if="${#lists.isEmpty(bookings)}">
        <h4>Chua co ve nao</h4>
        <p class="text-muted mb-0">Khi dat ve thanh cong, lich su se hien thi tai day.</p>
    </div>
</main>

<div th:replace="~{layout/site-footer :: site-footer}"></div>
</body>
</html>
