<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/cinema.css}">
</head>
<body class="cinema-body d-flex align-items-center" style="min-height:100vh;">
<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-5 col-md-7">
            <div class="cinema-panel p-4">
                <h2 class="text-center mb-1">Tạo tài khoản</h2>
                <p class="text-muted text-center mb-4">Đặt vé nhanh và lưu lịch sử xem phim.</p>

                <div th:if="${error}" class="alert alert-danger">
                    <span th:text="${error}"></span>
                </div>

                <form th:action="@{/auth/register}" th:object="${req}" method="post">
                    <div class="form-group">
                        <label>Họ tên</label>
                        <input type="text" th:field="*{fullName}" class="form-control cinema-search"
                               th:classappend="${#fields.hasErrors('fullName')} ? 'is-invalid'">
                        <div class="text-danger" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></div>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" th:field="*{email}" class="form-control cinema-search"
                               th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'">
                        <div class="text-danger" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                    </div>
                    <div class="form-group">
                        <label>Số điện thoại</label>
                        <input type="text" th:field="*{phone}" class="form-control cinema-search">
                    </div>
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" th:field="*{username}" class="form-control cinema-search"
                               th:classappend="${#fields.hasErrors('username')} ? 'is-invalid'">
                        <div class="text-danger" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
                    </div>
                    <div class="form-group">
                        <label>Mật khẩu</label>
                        <input type="password" th:field="*{password}" class="form-control cinema-search"
                               th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'">
                        <div class="text-danger" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                    </div>
                    <div class="form-group">
                        <label>Nhập lại mật khẩu</label>
                        <input type="password" th:field="*{confirmPassword}" class="form-control cinema-search"
                               th:classappend="${#fields.hasErrors('confirmPassword')} ? 'is-invalid'">
                        <div class="text-danger" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
                    </div>
                    <button type="submit" class="btn cinema-btn cinema-btn-gold btn-block">Đăng ký</button>
                </form>

                <div class="text-center mt-3">
                    <a class="text-warning" th:href="@{/auth/login}">Đã có tài khoản? Đăng nhập</a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
